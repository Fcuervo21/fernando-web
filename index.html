<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fernando Cuervo | Technical Consultant</title>
    <style>
        :root {
            --primary: #0070f3;
            --dark: #111;
            --light: #fafafa;
            --gray: #666;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }
        p {
            font-size: 1.2rem;
            color: var(--gray);
            line-height: 1.6;
        }
        .badge {
            background: var(--primary);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #999;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: var(--dark);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">En línea vía Fastly</span>
        <h1>Fernando Cuervo</h1>
        <p>Technical Consultant especializado en infraestructura de alto rendimiento y soluciones en la nube.</p>
        <a href="mailto:tu-correo@ejemplo.com" class="btn">Contáctame</a>
        <div class="footer">
            © 2026 Fernando Cuervo. Construido con GitHub Pages & Fastly Edge.
        </div>
    </div>
</body>
</html>
