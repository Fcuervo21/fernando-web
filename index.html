<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fernando Cuervo | Technical Consultant</title>
    <style>
        :root {
            --primary: #00ffcc; /* Verde neón técnico */
            --bg: #050505;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Fondo de malla de gradiente animado */
        .mesh {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(at 0% 0%, rgba(0, 255, 204, 0.15) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(0, 112, 243, 0.15) 0, transparent 50%);
            z-index: 1;
        }

        /* Efecto de ruido sutil */
        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 90%;
            max-width: 1200px;
        }

        .status-container {
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
        }

        .badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-size: clamp(3.5rem, 12vw, 8rem); /* Tamaño masivo responsivo */
            font-weight: 900;
            line-height: 0.9;
            margin-bottom: 2rem;
            letter-spacing: -0.05em;
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.4) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: clamp(1.2rem, 3vw, 2rem);
            max-width: 800px;
            margin: 0 auto;
            color: #888;
            font-weight: 300;
            line-height: 1.4;
        }

        .footer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            z-index: 10;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        /* Línea decorativa técnica */
        .line {
            width: 1px;
            height: 100px;
            background: linear-gradient(to bottom, var(--primary), transparent);
            margin: 40px auto 0;
            opacity: 0.5;
        }

    </style>
</head>
<body>
    <div class="mesh"></div>
    
    <div class="content">
        <div class="status-container">
            <div class="badge">
                <div class="dot"></div>
                Live via Fastly Edge
            </div>
        </div>
        
        <h1>Fernando<br>Cuervo</h1>
        
        <p>Technical Consultant specializing in high-performance infrastructure and cloud-native solutions.</p>
        
        <div class="line"></div>
    </div>

    <div class="footer">
        © 2026 Built with GitHub Pages & Fastly
    </div>
</body>
</html>
